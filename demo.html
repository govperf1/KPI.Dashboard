<!doctype html>
<html lang="en" dir="ltr">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <title>QUMC GRC Module Demo</title>
  <link rel="stylesheet" href="css/grc.css">
  <style>
    body{margin:0;font-family:system-ui;background:#0b1728;color:#fff;display:grid;place-items:center;min-height:100vh}
    .demo-launch{background:#fff;color:#152538;padding:28px;border-radius:18px;width:min(520px,90vw);box-shadow:0 30px 80px rgba(0,0,0,.35)}
    .demo-launch h1{margin:0 0 8px}.demo-launch p{color:#64748b;line-height:1.55}.demo-launch button{border:0;border-radius:10px;padding:11px 16px;margin:5px;background:#0195af;color:#fff;font-weight:800;cursor:pointer}.demo-launch button.alt{background:#152538}
  </style>
</head>
<body>
  <div id="_bgLayer" style="display:none"></div>
  <div id="_authOverlay" style="display:none"></div>
  <div id="_forgotOverlay" style="display:none"></div>
  <div id="_portalOverlay" class="demo-launch">
    <h1>QUMC GRC Module Demo</h1>
    <p>Use the buttons below to test the Super Admin interface and the Coming Soon experience for other roles.</p>
    <button onclick="setRole('super_admin');_selectPortal('grc')">Open as Super Admin</button>
    <button class="alt" onclick="setRole('viewer');_selectPortal('grc')">Open as Viewer</button>
  </div>
  <script>
    window._fbRole='super_admin';window._fbName='Demo Super Admin';
    window.setRole=function(role){window._fbRole=role;window._fbName=role==='super_admin'?'Demo Super Admin':'Demo Viewer';};
    window._selectPortal=async function(portal){console.log('Original portal handler:',portal);};
    window._backToPortal=function(){document.getElementById('_portalOverlay').style.display='block';};
    (function(){var r=new URLSearchParams(location.search).get('role');if(r){setRole(r);setTimeout(function(){_selectPortal('grc');},150);}})();
  </script>
  <script src="js/grc.js"></script>
</body>
</html>
